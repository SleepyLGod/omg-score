services:
  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/transcription-api/Dockerfile
    environment:
      OMG_TRANSCRIPTION_MODEL_PATH: /workspace/.models/transcription.onnx
      OMG_TRANSCRIPTION_WORK_DIR: /workspace/.runtime
    ports:
      - "8084:8084"
    volumes:
      - ./apps/transcription-api:/workspace/apps/transcription-api
      - ./.isolation/m2:/root/.m2/repository
      - ./.isolation/models:/workspace/.models
      - ./.isolation/backend-workspace:/workspace/.runtime
    working_dir: /workspace/apps/transcription-api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/transcription/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: apps/piano-player/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
